<style>
  :root{--ink:#1b1a17;--soft:#56544d;--muted:#a39d92;--line:#e6e2d9;--hair:#ded9ce;--bg:#f3f1ec;--card:#ffffff;--paper2:#eceae3;--clay:#9a7257;
    --font:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --display:'Jost','Inter',-apple-system,sans-serif}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:var(--font);font-weight:300;color:var(--ink);line-height:1.6;background:var(--bg);-webkit-font-smoothing:antialiased;letter-spacing:.1px}
  h1,h2,h3,.logo,.amt{font-family:var(--display);font-weight:300}
  a{color:inherit}
  .wrap{max-width:1060px;margin:0 auto;padding:0 30px}
  .kick{font-family:var(--display);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:400}
  /* nav */
  nav{position:sticky;top:0;background:rgba(243,241,236,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--hair);z-index:10}
  nav .wrap{display:flex;align-items:center;gap:18px;padding:20px 30px}
  .logo{font-weight:300;font-size:18px;letter-spacing:5px;text-transform:lowercase;color:var(--ink);display:flex;align-items:center;gap:11px}
  .logo span{color:var(--ink)}
  .logomark{width:30px;height:30px;flex:0 0 30px}
  nav .spacer{flex:1}
  .lang{display:flex;gap:6px}
  .lang button{border:1px solid var(--hair);background:none;border-radius:0;padding:6px 10px;font-family:var(--display);font-size:10px;letter-spacing:1.5px;cursor:pointer;color:var(--muted)}
  .lang button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .btn{display:inline-block;border:none;border-radius:0;padding:14px 26px;font-family:var(--display);font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:background .15s,color .15s}
  .btn.primary,.btn.pop{background:var(--ink);color:var(--bg)}
  .btn.primary:hover,.btn.pop:hover{background:#000}
  .btn.outline{border:1px solid var(--ink);background:none;color:var(--ink)}
  .btn.outline:hover{background:var(--ink);color:var(--bg)}
  .btn.sm{padding:10px 16px}
  /* hero */
  .hero{background:var(--bg);color:var(--ink);padding:120px 0 110px;text-align:center;border-bottom:1px solid var(--hair)}
  .hero h1{font-size:72px;line-height:1.02;letter-spacing:.5px;margin:0 0 26px;font-weight:300}
  .hero h1 em{font-style:italic;color:var(--clay)}
  .hero p.sub{font-size:18px;font-weight:300;color:var(--soft);max-width:600px;margin:0 auto 38px;line-height:1.7}
  .hero-mark{width:200px;max-width:62%;margin:0 auto 30px;display:block}
  .hero-mark text{font-family:var(--display);font-weight:400}
  .hero .cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .badge{display:inline-block;background:none;color:var(--clay);font-family:var(--display);font-weight:400;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:0;margin-bottom:30px}
  .note{font-size:11px;letter-spacing:1px;color:var(--muted);margin-top:22px;text-transform:uppercase;font-family:var(--display)}
  /* sections */
  section{padding:96px 0}
  h2.sec{font-size:40px;letter-spacing:.5px;text-align:center;margin:0 0 14px;font-weight:300}
  p.lead{text-align:center;color:var(--soft);max-width:600px;margin:0 auto 56px;font-size:16px;font-weight:300}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--hair)}
  @media(max-width:820px){.grid{grid-template-columns:1fr}.hero h1{font-size:44px}}
  .card{border:none;border-bottom:1px solid var(--hair);border-right:1px solid var(--hair);border-radius:0;padding:38px 30px;background:none}
  .grid .card:nth-child(3n){border-right:none}
  .card .ic{font-size:20px;filter:grayscale(1);opacity:.55}
  .card h3{margin:18px 0 8px;font-size:20px;font-weight:400}
  .card p{margin:0;color:var(--soft);font-size:14px;font-weight:300;line-height:1.65}
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;counter-reset:s}
  @media(max-width:820px){.steps{grid-template-columns:1fr}}
  .step{position:relative;padding:30px 0 0;border-top:1px solid var(--ink)}
  .step::before{counter-increment:s;content:"0" counter(s);font-family:var(--display);font-weight:300;font-size:13px;letter-spacing:2px;color:var(--clay)}
  .step h3{margin:10px 0 8px;font-size:21px;font-weight:400}
  .step p{margin:0;color:var(--soft);font-size:14px;font-weight:300}
  /* pricing */
  .price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;align-items:stretch;border-top:1px solid var(--hair)}
  @media(max-width:820px){.price-grid{grid-template-columns:1fr}}
  .plan{border:none;border-right:1px solid var(--hair);border-radius:0;padding:38px 30px;display:flex;flex-direction:column}
  .price-grid .plan:last-child{border-right:none}
  .plan.feat{border-top:2px solid var(--clay);box-shadow:none;background:var(--card)}
  .plan h3{margin:0 0 6px;font-size:20px;font-weight:400}
  .plan .amt{font-size:42px;font-weight:300;margin:10px 0}
  .plan .amt small{font-size:13px;font-weight:300;color:var(--muted);font-family:var(--font)}
  .plan ul{list-style:none;padding:0;margin:18px 0 24px;flex:1}
  .plan li{padding:8px 0 8px 18px;position:relative;font-size:13.5px;color:var(--soft);font-weight:300;border-bottom:1px solid var(--line)}
  .plan li::before{content:"—";position:absolute;left:0;color:var(--clay)}
  .tag{font-family:var(--display);font-size:10px;font-weight:400;text-transform:uppercase;letter-spacing:2px;color:var(--clay);margin-bottom:6px}
  /* feedback */
  .feedback{background:var(--card);border:1px solid var(--hair);border-radius:0;padding:70px 48px;text-align:center}
  .feedback h2{margin:0 0 14px;font-size:34px}
  .feedback p{color:var(--soft);max-width:540px;margin:0 auto 30px;font-weight:300}
  footer{padding:44px 0;border-top:1px solid var(--hair);color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;font-family:var(--display);text-align:center}
  [data-i]{}
  @media(max-width:620px){
    nav .wrap{flex-wrap:wrap;gap:10px 14px;padding:14px 20px}
    .wrap{padding:0 20px}
    section{padding:60px 0}
    .hero{padding:80px 0 70px}
    .hero h1{font-size:38px}
    .hero p.sub{font-size:16px}
    h2.sec{font-size:30px}
    .feedback{padding:44px 24px}
    .card{border-right:none}
    .plan{border-right:none;border-bottom:1px solid var(--hair)}
    .price-grid .plan:last-child{border-bottom:none}
  }
