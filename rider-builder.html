<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoboRider — Rider Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="roborider-favicon.svg">
<style>
  :root{
    --accent:#1b1a17;
    --bg:#f3f1ec; --panel:#ffffff; --paper2:#eceae3; --line:#e6e2d9; --hair:#ded9ce;
    --ink:#1b1a17; --soft:#56544d; --muted:#a39d92;
    --brand:#1b1a17; --brand-d:#000000; --clay:#9a7257; --pop:#9a7257;
    --radius:2px; --shadow:0 24px 50px -28px rgba(27,26,23,.30);
    --font:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --display:'Jost','Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);font-weight:400;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5;letter-spacing:.1px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
    padding:18px 26px;background:var(--bg);border-bottom:1px solid var(--hair);flex-wrap:wrap}
  .logo{font-family:var(--display);font-weight:300;letter-spacing:5px;font-size:18px;color:var(--ink);text-transform:lowercase;display:flex;align-items:center;gap:11px;text-decoration:none;cursor:pointer}
  .logo:hover{opacity:.7}
  .logo span{color:var(--ink)}
  .logomark{width:30px;height:30px;flex:0 0 30px}
  .topbar>span{color:var(--muted)!important}
  .topbar .spacer{flex:1}
  .langwrap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .langwrap select{border:1px solid var(--hair);border-radius:0;padding:8px 8px;font-size:11px;background:transparent;color:var(--ink);font-family:var(--display);letter-spacing:1px}
  .btn{border:none;background:none;color:var(--soft);border-radius:0;padding:8px 4px;font-family:var(--display);font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;transition:color .15s}
  .btn:hover{color:var(--ink)}
  .btn.primary{background:var(--ink);color:var(--bg);padding:11px 22px;letter-spacing:2px}
  .btn.primary:hover{background:#000;color:var(--bg)}
  .btn.ghost{border:1px solid var(--hair);padding:10px 16px}
  .btn.ghost:hover{border-color:var(--ink)}
  .layout{display:grid;grid-template-columns:minmax(340px,1fr) minmax(380px,1.05fr);gap:0;height:calc(100vh - 69px)}
  .mobile-tabs{display:none}
  @media(max-width:860px){
    .topbar{position:static;padding:12px 16px;gap:8px 10px;row-gap:8px}
    .logo{font-size:16px;letter-spacing:3px}
    .layout{display:block;height:auto}
    .mobile-tabs{display:flex;position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--hair)}
    .mobile-tabs button{flex:1;border:none;background:none;padding:14px 0;font-family:var(--display);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer}
    .mobile-tabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
    .editor,.preview-wrap{display:none}
    .layout.show-edit .editor{display:block}
    .layout.show-preview .preview-wrap{display:block}
    .editor{padding:22px 18px 70px;border-right:none}
    .preview-wrap{padding:14px}
    .page{padding:32px 24px}
    .doc-cover{padding:36px 24px}
    .doc-band{font-size:46px;letter-spacing:2px}
    .row{flex-wrap:wrap}
    .modal-head{padding:12px 14px;gap:8px}
    .stage-scroll{padding:12px}
    .palette{padding:10px 14px}
  }
  .editor{overflow-y:auto;padding:40px 38px 70px;border-right:1px solid var(--hair)}
  .ai-box{background:none;border:none;border-top:2px solid var(--clay);padding:18px 0 0;margin:0 0 44px}
  .ai-box h3{margin:6px 0 8px;font-size:26px;font-family:var(--display);font-weight:300;letter-spacing:.3px;line-height:1.2}
  .ai-box p{margin:0 0 16px;color:var(--soft);font-size:13px;font-weight:300;line-height:1.6;max-width:48ch}
  .ai-box textarea{width:100%;min-height:64px;border:none;border-bottom:1px solid var(--ink);border-radius:0;padding:8px 0;font-family:inherit;font-size:14px;font-weight:300;resize:vertical;background:transparent;color:var(--ink)}
  .ai-box textarea:focus{outline:none}
  .ai-box .btn{background:none;border:1px solid var(--ink);color:var(--ink);padding:10px 18px}
  .ai-box .btn:hover{background:var(--ink);color:var(--bg)}
  .wiz-kick{font-family:var(--display);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--clay);font-weight:400}
  .wiz-desc{margin:8px 0 4px;color:var(--soft);font-size:13px;font-weight:300;line-height:1.6}
  .wz-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px;margin:4px 0 2px}
  .wzrow{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:13px;font-weight:300;cursor:pointer}
  .wzrow input[type=checkbox]{width:16px;height:16px;flex:0 0 16px;accent-color:var(--ink);cursor:pointer}
  .wzrow span{flex:1}
  .wzrow input[type=number]{width:44px;border:none;border-bottom:1px solid var(--hair);border-radius:0;padding:3px 2px;font-size:13px}
  .wz-radios{display:flex;gap:18px;flex-wrap:wrap;margin:6px 0 2px}
  .wz-radios label{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:300;cursor:pointer}
  .wz-radios input[type=radio]{accent-color:var(--ink);cursor:pointer}
  @media(max-width:860px){.wz-grid{grid-template-columns:1fr}}
  details.sec{background:none;border:none;border-top:1px solid var(--hair);border-radius:0;margin-bottom:0;overflow:hidden}
  details.sec>summary{list-style:none;cursor:pointer;padding:22px 0 18px;font-family:var(--display);font-weight:300;font-size:22px;letter-spacing:.4px;display:flex;align-items:center;gap:16px;user-select:none}
  details.sec>summary::-webkit-details-marker{display:none}
  details.sec>summary .chev{margin-left:auto;color:var(--muted);transition:transform .15s;font-size:14px;font-weight:300}
  details.sec[open]>summary .chev{transform:rotate(90deg)}
  details.sec>summary .num{background:none;color:var(--muted);width:24px;font-family:var(--display);font-weight:300;font-size:12px;letter-spacing:1px;display:inline-flex}
  details.sec[open]>summary{padding-bottom:6px}
  details.sec[open]>summary .num{color:var(--clay)}
  .sec-body{padding:0 0 34px 40px}
  label.fld{display:block;margin:18px 0 7px;font-family:var(--display);font-size:10px;font-weight:400;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}
  input[type=text],input[type=date],input[type=number],textarea,select{
    width:100%;border:none;border-bottom:1px solid var(--hair);border-radius:0;padding:8px 2px;font-family:inherit;font-weight:300;font-size:15px;background:transparent;color:var(--ink)}
  input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,textarea:focus,select:focus{outline:none;border-bottom-color:var(--ink)}
  textarea{resize:vertical;min-height:60px;line-height:1.55}
  .row{display:flex;gap:8px}
  .row>*{flex:1}
  .repeat{border:none;border-bottom:1px solid var(--hair);border-radius:0;padding:6px 0 10px;margin-top:6px;background:none}
  .repeat .row{margin-bottom:6px}
  .mini{border:none;background:none;border:1px solid var(--hair);border-radius:0;width:30px;height:34px;font-size:15px;color:var(--muted);flex:0 0 30px}
  .rowctl{display:flex;gap:4px;flex:0 0 auto}
  .mini2{border:1px solid var(--hair);background:none;border-radius:0;width:24px;height:34px;font-size:11px;color:var(--muted);padding:0}
  .mini2:hover{border-color:var(--ink);color:var(--ink)}
  .add{margin-top:10px;font-family:var(--display);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--soft);background:none;border:1px solid var(--hair);border-radius:0;padding:10px;width:100%;font-weight:400}
  .add:hover{border-color:var(--ink);color:var(--ink)}
  .hint{font-size:11px;color:var(--muted);margin-top:4px}
  .save-ind{font-family:var(--display);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);white-space:nowrap;transition:color .2s}
  .topbar .btn.procta{color:var(--clay);border:1px solid var(--clay);padding:7px 12px}
  .topbar .btn.procta:hover{background:var(--clay);color:#fff}
  body.free #preview .page{background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='300'%20height='185'%3E%3Ctext%20x='8'%20y='112'%20transform='rotate(-27%20150%2092)'%20font-family='Arial,sans-serif'%20font-size='22'%20font-weight='bold'%20fill='%231b1a17'%20fill-opacity='0.11'%3ERoboRider%20FREE%3C/text%3E%3C/svg%3E");background-repeat:repeat;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body.free #preview .page::after{content:"Free version — subscribe at roborider.nl to remove the watermark";display:block;margin-top:26px;border-top:1px solid var(--clay);padding-top:8px;font-family:var(--display);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--clay);text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .onboard{display:flex;align-items:flex-start;gap:10px;background:#f6f1e9;border:1px solid #e3d6bf;border-left:3px solid var(--clay);padding:11px 13px;margin-bottom:18px;font-size:12.5px;color:var(--soft);line-height:1.5}
  .onboard button{margin-left:auto;flex:0 0 auto;border:none;background:none;font-size:16px;line-height:1;color:var(--muted);cursor:pointer;padding:0 2px}
  .onboard button:hover{color:var(--ink)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
  .chips-lbl{font-family:var(--display);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-right:3px}
  .chip{font-family:var(--display);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;border:1px solid var(--hair);background:none;border-radius:0;padding:8px 13px;font-weight:400;color:var(--soft);cursor:pointer}
  .chip:hover{border-color:var(--ink);color:var(--ink)}
  .color-presets{display:flex;gap:7px;margin-top:8px}
  .swatch{width:24px;height:24px;border-radius:0;border:1px solid var(--hair);cursor:pointer}
  .preview-wrap{overflow-y:auto;background:var(--paper2);padding:30px}
  .page{background:#fff;max-width:760px;margin:0 auto 26px;padding:62px 58px;box-shadow:var(--shadow);min-height:200px;color:var(--ink)}
  .doc-cover{padding:64px 58px}
  .doc-logo-img{max-height:80px;max-width:55%;margin:0 0 26px;display:block;object-fit:contain}
  .doc-band{font-family:var(--display);font-size:66px;font-weight:300;letter-spacing:4px;line-height:1;margin:0;color:var(--accent);text-transform:uppercase}
  .doc-title{font-family:var(--display);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:24px 0 0;font-weight:400;border-top:1px solid var(--ink);padding-top:14px}
  .doc-valid{font-family:var(--display);font-size:11px;color:var(--muted);margin-top:14px;letter-spacing:2px;text-transform:uppercase}
  .doc-cover .contact{margin-top:40px;font-size:13px;font-weight:300;color:var(--ink)}
  .doc-cover .contact strong{display:block;font-size:18px;font-family:var(--display);font-weight:300;letter-spacing:.5px;margin-bottom:4px}
  h2.sec-h{font-family:var(--display);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ink);background:none;
    display:block;padding:0 0 10px;border-bottom:1px solid var(--ink);border-radius:0;margin:0 0 18px;font-weight:400}
  h3.sub-h{font-family:var(--display);font-size:9.5px;font-weight:400;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:22px 0 7px;border:none;padding:0}
  .doc p{margin:0 0 10px;white-space:pre-wrap;font-weight:300;line-height:1.6}
  .doc ul{margin:6px 0 14px;padding-left:0;list-style:none}
  .doc li{margin-bottom:6px;font-weight:300;padding-left:16px;position:relative}
  .doc li::before{content:"—";position:absolute;left:0;color:var(--clay)}
  table.grid{width:100%;border-collapse:collapse;font-size:11.5px;margin:8px 0 14px}
  table.grid th{background:none;color:var(--muted);text-align:left;padding:7px 8px;font-family:var(--display);font-weight:400;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--ink)}
  table.grid td{border:none;border-bottom:1px solid var(--line);padding:7px 8px;vertical-align:top;font-weight:300}
  table.grid td:first-child{color:var(--clay)}
  .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px 26px;border:none;border-top:1px solid var(--ink);border-radius:0;overflow:visible;margin-bottom:16px;padding-top:14px}
  .contact-grid .c{padding:0;border:none}
  .contact-grid .role{font-family:var(--display);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:400}
  .contact-grid .nm{font-weight:400;margin:4px 0 1px;font-size:15px}
  .contact-grid .dt{font-size:12px;color:var(--soft);font-weight:300}
  .stageplot-img{max-width:100%;border:1px solid var(--line);border-radius:0;margin-top:6px}
  .drink-cols{columns:2;column-gap:28px;font-size:12.5px;font-weight:300}
  /* ---------- Stage plot editor ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:18px}
  .modal-bg.open{display:flex}
  .modal{background:var(--bg);border-radius:0;width:min(960px,97vw);max-height:95vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-head{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--hair);flex-wrap:wrap}
  .modal-head .btn{background:none;color:var(--soft);border:none}
  .modal-head .btn:hover{color:var(--ink)}
  .modal-head .btn.primary{background:var(--ink);color:var(--bg);padding:10px 20px}
  .modal-head .btn.ghost{border:1px solid var(--hair)}
  .modal-head h3{margin:0;font-family:var(--display);font-weight:300;font-size:20px;letter-spacing:.5px}
  .modal-head .spacer{flex:1}
  .palette{display:flex;flex-wrap:wrap;gap:7px;padding:14px 20px;border-bottom:1px solid var(--hair);background:none}
  .palette button{font-family:var(--display);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;border:1px solid var(--hair);background:none;border-radius:0;padding:8px 12px;font-weight:400;color:var(--soft)}
  .palette button:hover{border-color:var(--ink);color:var(--ink)}
  .stage-scroll{padding:24px;overflow:auto;background:var(--paper2)}
  .stagecanvas{position:relative;background:#fff;border:2px solid var(--accent);border-radius:4px;width:100%;max-width:840px;aspect-ratio:16/10;container-type:size;margin:0 auto;touch-action:none;
    background-image:linear-gradient(rgba(0,0,0,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.045) 1px,transparent 1px);background-size:4% 4%}
  .stage-front{position:absolute;left:0;right:0;bottom:0;text-align:center;font-family:var(--display);font-size:2cqh;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:4px 0;border-top:1px solid var(--line);font-weight:400;pointer-events:none}
  .pl-el{position:absolute;transform:translate(-50%,-50%);user-select:none;cursor:grab}
  .pl-shape{width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;font-family:var(--display);font-weight:400;letter-spacing:.5px;text-transform:uppercase;
    font-size:2.3cqh;line-height:1.05;border:1px solid var(--ink);border-radius:0;background:#fff;overflow:hidden;padding:2px;color:var(--ink);
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pl-shape.sh-circle{border-radius:50%}
  .pl-shape.sh-riser{border-style:dashed}
  .pl-shape.sh-text{border:none;background:transparent!important}
  .pl-el.sel .pl-shape{box-shadow:0 0 0 2px var(--clay)}
  .pl-ctl{position:absolute;top:-9px;width:19px;height:19px;border-radius:50%;border:none;color:#fff;font-size:12px;line-height:19px;
    text-align:center;cursor:pointer;display:none;z-index:6;padding:0}
  .pl-el:hover .pl-ctl,.pl-el.sel .pl-ctl{display:block}
  .pl-del{right:-9px;background:var(--ink)}
  .pl-rot{left:-9px;background:var(--clay)}
  .pl-resize{position:absolute;right:-7px;bottom:-7px;width:15px;height:15px;background:#fff;border:2px solid var(--clay);
    border-radius:0;cursor:nwse-resize;display:none;z-index:6}
  .pl-el:hover .pl-resize,.pl-el.sel .pl-resize{display:block}
  /* read-only plot in the rider preview */
  .plot-preview{position:relative;width:100%;aspect-ratio:16/10;border:1px solid var(--ink);border-radius:0;
    container-type:size;background:#fff;margin-top:4px}
  .plot-preview .pl-el{cursor:default}
  @media print{
    .topbar,.editor,.ai-box,.mobile-tabs{display:none!important}
    .layout{display:block;height:auto}
    .preview-wrap{display:block!important;padding:0;background:#fff;overflow:visible}
    .page{box-shadow:none;margin:0;max-width:100%;padding:24mm 18mm;page-break-after:always}
    .page:last-child{page-break-after:auto}
    /* long input list: never split a row, repeat the header on each printed page */
    table.grid{page-break-inside:auto}
    table.grid thead{display:table-header-group}
    table.grid tr{page-break-inside:avoid;break-inside:avoid}
    h3.sub-h{page-break-after:avoid}
    @page{size:A4;margin:0}
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="index.html" title="Home"><svg class="logomark" viewBox="0 0 64 64" aria-hidden="true"><defs><radialGradient id="mic" cx="36%" cy="28%" r="72%"><stop offset="0%" stop-color="#f7f7f9"/><stop offset="48%" stop-color="#c7c8cc"/><stop offset="100%" stop-color="#86888f"/></radialGradient></defs><g transform="translate(0,4)"><line x1="32" y1="18" x2="32" y2="11" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/><circle cx="32" cy="7.5" r="3.6" fill="url(#mic)" stroke="currentColor" stroke-width="0.7"/><line x1="29" y1="6.5" x2="35" y2="6.5" stroke="#6b6e74" stroke-width="0.45" opacity="0.85"/><line x1="28.7" y1="8.3" x2="35.3" y2="8.3" stroke="#6b6e74" stroke-width="0.45" opacity="0.85"/><rect x="11" y="18" width="42" height="30" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linejoin="round"/><rect x="11" y="45.6" width="42" height="2.4" fill="currentColor"/><rect x="17" y="24" width="11" height="9" fill="currentColor"/><rect x="36" y="24" width="11" height="9" fill="currentColor"/><ellipse cx="32" cy="40" rx="3.6" ry="3.2" fill="#9a7257"/></g></svg><span>roborider</span></a>
  <span id="tagline" style="color:var(--muted);font-size:12px"></span>
  <div class="spacer"></div>
  <span id="saveStatus" class="save-ind"></span>
  <div class="langwrap">
    <span id="langLabel"></span>
    <select id="langSel" onchange="setLang(this.value)">
      <option value="en">English</option>
      <option value="nl">Nederlands</option>
      <option value="de">Deutsch</option>
      <option value="fr">Français</option>
      <option value="es">Español</option>
    </select>
  </div>
  <button class="btn ghost" id="btnNew" onclick="newDoc()"></button>
  <button class="btn ghost" id="btnExample" onclick="loadExample()"></button>
  <button class="btn" id="btnTranslate" onclick="translateRider()" title="Translate own text to selected language">🌐 <span id="btnTranslateLbl"></span></button>
  <button class="btn" id="btnAI" onclick="promptAIKey()" title="Set OpenAI API key for live AI">✦ AI <span id="aiKeyState" style="font-size:11px;color:var(--muted)"></span></button>
  <button class="btn" id="btnPro" onclick="openProModal()" title="RoboRider Pro"></button>
  <button class="btn" id="btnCloudSave" onclick="cloudSaveQuick()" title="Save to account" style="display:none"></button>
  <button class="btn" id="btnAccount" onclick="openAcctModal()" title="Account" style="display:none"></button>
  <button class="btn" id="btnOpen" onclick="importJSON()"></button>
  <button class="btn" id="btnSave" onclick="exportJSON()"></button>
  <button class="btn primary" id="btnPdf" onclick="window.print()"></button>
</div>
<div id="sharedBar" style="display:none;background:var(--ink);color:var(--bg);padding:11px 16px;font-family:var(--display);font-size:12px;letter-spacing:.4px;text-align:center">
  <span id="sharedBarTxt"></span> · <a href="index.html" id="sharedBarCta" style="color:var(--bg);text-decoration:underline"></a>
</div>
<style>
body.shared #btnNew,body.shared #btnExample,body.shared #btnTranslate,body.shared #btnAI,body.shared #btnPro,body.shared #btnAccount,body.shared #btnCloudSave,body.shared #btnOpen,body.shared #btnSave,body.shared #saveStatus,body.shared .mobile-tabs,body.shared #wizard,body.shared #onboard{display:none !important;}
body.shared .editor{display:none !important;}
body.shared .layout{display:block !important;}
body.shared .preview-wrap{max-width:900px;margin:0 auto;}
</style>

<div class="mobile-tabs">
  <button id="tabEdit" class="on" onclick="setView('edit')"></button>
  <button id="tabPreview" onclick="setView('preview')"></button>
</div>
<div class="layout show-edit" id="layout">
  <div class="editor" id="editor">
    <div id="onboard" class="onboard" style="display:none"></div>
    <div class="ai-box" id="wizard"></div>
    <div id="formMount"></div>
  </div>
  <div class="preview-wrap">
    <div id="preview" class="doc"></div>
  </div>
</div>

<!-- Stage plot editor modal -->
<div class="modal-bg" id="plotModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="plotTitle"></h3>
      <span class="spacer"></span>
      <button class="btn ghost" id="plotClear" onclick="clearPlot()"></button>
      <button class="btn primary" id="plotDone" onclick="closePlotModal()"></button>
    </div>
    <div class="palette" id="plotPalette"></div>
    <div style="padding:8px 16px 0;font-size:12px;color:var(--muted)" id="plotHint"></div>
    <div class="stage-scroll">
      <div class="stagecanvas" id="stagecanvas" onclick="if(event.target===this){selPlot=null;highlightSel();}">
        <div class="stage-front" id="stageFront"></div>
      </div>
    </div>
  </div>
</div>

<!-- Pro / subscription modal -->
<div class="modal-bg" id="proModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-head"><h3 id="proTitle">RoboRider Pro</h3><span class="spacer"></span><button class="btn ghost" onclick="closeProModal()">✕</button></div>
    <div style="padding:24px">
      <p id="proStatusLine" style="font-size:13px;color:var(--soft);margin:0 0 18px;line-height:1.5"></p>
      <button class="btn primary" style="width:100%" id="proSubBtn" onclick="proSubscribe()"></button>
      <button class="btn ghost" style="width:100%;margin-top:8px;display:none" id="proLoginBtn" onclick="closeProModal();openAcctModal();"></button>
      <div style="text-align:center;font-family:var(--display);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:18px 0">— <span id="proOr"></span> —</div>
      <label class="fld" id="proKeyLbl"></label>
      <div style="display:flex;gap:8px">
        <input type="text" id="proKeyInput" style="flex:1" placeholder="XXXXXXXX-XXXX-XXXX">
        <button class="btn primary" id="proActBtn" onclick="proActivate()" style="flex:0 0 auto"></button>
      </div>
      <p id="proMsg" class="hint" style="margin-top:8px"></p>
      <div id="proManageWrap" style="margin-top:16px;display:none"><button class="btn ghost" id="proRemoveBtn" onclick="deactivatePro();closeProModal();"></button></div>
    </div>
  </div>
</div>

<!-- Account / cloud modal -->
<div class="modal-bg" id="acctModal">
  <div class="modal" style="max-width:460px">
    <div class="modal-head"><h3 id="acctTitle">Account</h3><span class="spacer"></span><button class="btn ghost" onclick="closeAcctModal()">✕</button></div>
    <div style="padding:24px">
      <div id="acctLogin">
        <p id="acctIntro" style="font-size:13px;color:var(--soft);margin:0 0 16px;line-height:1.5"></p>
        <label class="fld" id="acctEmailLbl"></label>
        <div style="display:flex;gap:8px">
          <input type="email" id="acctEmail" style="flex:1" placeholder="you@example.com">
          <button class="btn primary" id="acctSendBtn" onclick="sendMagicLink()" style="flex:0 0 auto"></button>
        </div>
      </div>
      <div id="acctIn" style="display:none">
        <p id="acctWho" style="font-size:13px;color:var(--soft);margin:0 0 16px;line-height:1.5"></p>
        <label class="fld" id="acctLangLbl"></label>
        <select id="acctLang" onchange="setAcctLang(this.value)" style="width:100%;margin-bottom:16px">
          <option value="en">English</option>
          <option value="nl">Nederlands</option>
          <option value="de">Deutsch</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
        </select>
        <label class="fld" id="acctSaveLbl"></label>
        <div style="display:flex;gap:8px">
          <input type="text" id="acctRiderName" style="flex:1" placeholder="">
          <button class="btn primary" id="acctSaveBtn" onclick="cloudSaveCurrent()" style="flex:0 0 auto"></button>
        </div>
        <div id="acctList" style="margin-top:16px"></div>
        <div style="margin-top:18px;border-top:1px solid var(--hair);padding-top:14px">
          <button class="btn ghost" id="acctLogoutBtn" onclick="signOut()"></button>
        </div>
      </div>
      <p id="acctMsg" class="hint" style="margin-top:10px"></p>
    </div>
  </div>
</div>

async function initAuth(){

    user=data&&data.session?data.session.user:null;
    sb.auth.onAuthStateChange((_e,s)=>{ user=s?s.user:null; onAuthChange(); });
  }catch(e){}

}
async function onAuthChange(){
  updateAccountUI();
  if(user){ await loadProfilePro(); const list=await refreshRiderList(); maybeAutoOpenLast(list); }

function isBlankState(){
  try{ const b=blank(); b.lang=S.lang; const cur=Object.assign({},S); cur.lang=S.lang; return JSON.stringify(b)===JSON.stringify(cur); }
  catch(e){ return false; }
}
function maybeAutoOpenLast(list){
  if(sharedMode) return;              // viewing a shared rider — don't override
  if(currentRiderId) return;          // already working on a saved rider
  if(!list||!list.length) return;     // nothing saved yet
  if(!isBlankState()) return;         // don't overwrite work in progress
  cloudLoad(list[0].id);              // open most recently updated rider
}

async function cloudShare(id){
  if(!sb||!user) return;
  try{
    let {data}=await sb.from("riders").select("share_id").eq("id",id).single();
    let token=data&&data.share_id;
    if(!token){ token=genToken(); await sb.from("riders").update({share_id:token}).eq("id",id); }
    const url=location.origin+location.pathname+"?share="+token;
    try{ await navigator.clipboard.writeText(url); $("acctMsg").textContent=L("acct_share_copied"); }
    catch(_){ prompt(L("acct_share_prompt"), url); }
  }catch(e){ $("acctMsg").textContent=L("acct_err"); }
}
async function tryOpenShared(){
  if(!sb) return false;
  const m=location.search.match(/[?&]share=([^&]+)/); if(!m) return false;
  const token=decodeURIComponent(m[1]);
  try{
    const {data}=await sb.rpc("get_shared_rider",{token:token});
    const row=Array.isArray(data)?data[0]:data;
    if(row&&row.data){
      S=Object.assign(blank(),row.data); selPlot=null;
      document.body.classList.add("shared");
      const bar=$("sharedBar"); if(bar){ $("sharedBarTxt").textContent=L("shared_banner"); $("sharedBarCta").textContent=L("shared_cta"); bar.style.display="block"; }
      applyChrome(); renderForm(); renderPreview();
      return true;
    }
  }catch(e){}
  return false;
}

/* ===================== Helpers ===================== */
const $ = id => document.getElementById(id);
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function bulletize(text){
  if(!text||!text.trim()) return "";
  const lines = text.split(/\n/).map(l=>l.replace(/^[-•*]\s?/,"").trim()).filter(Boolean);
  if(lines.length<=1) return `<p>${esc(text)}</p>`;
  return "<ul>"+lines.map(l=>`<li>${esc(l)}</li>`).join("")+"</ul>";
}
function t(x){return x&&x.trim();}

/* ===================== Form ===================== */
function field(label,val,path,opts={}){
  const tp=opts.type||"text";
  const ph=opts.ph?` placeholder="${opts.ph}"`:"";
  const hint=opts.hint?`<div class="hint">${opts.hint}</div>`:"";
  if(tp==="textarea") return `<label class="fld">${label}</label><textarea data-path="${path}"${ph}>${esc(val)}</textarea>${hint}`;
  return `<label class="fld">${label}</label><input type="${tp}" data-path="${path}" value="${esc(val)}"${ph}>${hint}`;
}
let openSecs=new Set([1,2,3]);
function captureOpenState(){
  const els=document.querySelectorAll("#formMount details.sec");
  if(!els.length)return;
  els.forEach(d=>{const n=+d.dataset.sec;if(d.open)openSecs.add(n);else openSecs.delete(n);});
}
function section(n,title,body){
  const open=openSecs.has(n)?"open":"";
  return `<details class="sec" data-sec="${n}" ${open}><summary><span class="num">${String(n).padStart(2,"0")}</span>${title}<span class="chev">›</span></summary><div class="sec-body">${body}</div></details>`;
}

function setPath(p,v){const k=p.split(".");let o=S;for(let i=0;i<k.length-1;i++)o=o[k[i]];o[k[k.length-1]]=v;}
function getPath(p){return p.split(".").reduce((o,k)=>o&&o[k],S);}
function setRep(p,v){const k=p.split(".");let o=S;for(let i=0;i<k.length-1;i++)o=o[k[i]];o[k[k.length-1]]=v;}
function addRow(p,item){const a=getPath(p);a.push(typeof item==="object"?JSON.parse(JSON.stringify(item)):item);renderForm();renderPreview();}
function addInput(){const a=S.inputs;a.push({ch:String(a.length+1),input:"",micdi:"",p48:"",stand:"",pos:"",notes:""});renderForm();renderPreview();}
function delRow(p,i){const a=getPath(p);a.splice(i,1);if(p==="inputs")renumberInputs();renderForm();renderPreview();}
function moveRow(p,i,dir){const a=getPath(p);const j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];if(p==="inputs")renumberInputs();renderForm();renderPreview();}
function dupRow(p,i){const a=getPath(p);const it=a[i];a.splice(i+1,0,(typeof it==="object")?JSON.parse(JSON.stringify(it)):it);if(p==="inputs")renumberInputs();renderForm();renderPreview();}
function rowCtl(p,i){return `<div class="rowctl">`+

  if(t(S.tech.monitors)) tc+=`<h3 class="sub-h">${L("sub_monitors")}</h3><p>${esc(S.tech.monitors)}</p>`;

  $("preview").innerHTML=h;

let selPlot=null;
const WEDGE="polygon(0% 100%,100% 100%,80% 0%,20% 0%)";
const Z_ORDER={riser:1,drums:3,keys:3,bass:3,guitar:3,vocal:3,amp:3,perc:3,di:5,power:5,mic:6,text:7};
function zOf(type){return Z_ORDER[type]||3;}
const PLOT_ICONS={drums:"🥁",keys:"🎹",bass:"🎸",guitar:"🎸",vocal:"🎤",riser:"",monitor:"🔈",amp:"🎛️",di:"",power:"⚡",mic:"🎤",perc:"🪘",text:""};
const SNAP=2; /* grid step in % for alignment */
function snap(v){return Math.round(v/SNAP)*SNAP;}
function plotLabelHTML(it){return esc(it.label);}
function uid(){return Math.random().toString(36).slice(2,9);}
function addPlotItem(type){
  const d=PLOT_TYPES[type];
  S.plot.items.push({id:uid(),type,label:d.lbl,x:50,y:42,w:d.w,h:d.h,rot:0});

function buildPalette(){

}
function shapeStyle(d,it){
  let s=`background:${d.sh==='text'?'transparent':d.c};`;
  if(d.sh==='wedge')s+=`clip-path:${WEDGE};-webkit-clip-path:${WEDGE};`;
  return s;
}
function buildPlotEl(it){
  const d=PLOT_TYPES[it.type]||PLOT_TYPES.text;
  const el=document.createElement("div");
  el.className="pl-el"+(it.id===selPlot?" sel":"");
  el.style.left=it.x+"%";el.style.top=it.y+"%";el.style.width=it.w+"%";el.style.height=it.h+"%";
  el.style.transform=`translate(-50%,-50%) rotate(${it.rot||0}deg)`;
  el.style.zIndex=(it.id===selPlot?99:zOf(it.type));
  el.dataset.id=it.id;
  const shape=document.createElement("div");
  shape.className="pl-shape sh-"+d.sh;
  shape.setAttribute("style",shapeStyle(d,it));
  shape.innerHTML=plotLabelHTML(it);
  el.appendChild(shape);
  const del=document.createElement("button");del.className="pl-ctl pl-del";del.textContent="×";
  del.onclick=ev=>{ev.stopPropagation();S.plot.items=S.plot.items.filter(x=>x.id!==it.id);selPlot=null;renderPlotEditor();renderPreview();};
  const rot=document.createElement("button");rot.className="pl-ctl pl-rot";rot.textContent="↻";
  rot.onclick=ev=>{ev.stopPropagation();it.rot=((it.rot||0)+45)%360;el.style.transform=`translate(-50%,-50%) rotate(${it.rot}deg)`;renderPreview();};
  const rz=document.createElement("div");rz.className="pl-resize";
  el.appendChild(del);el.appendChild(rot);el.appendChild(rz);
  el.addEventListener("pointerdown",e=>startDrag(e,it,el));
  rz.addEventListener("pointerdown",e=>startResize(e,it,el));
  el.addEventListener("dblclick",e=>{e.stopPropagation();editPlotLabel(it);});
  return el;
}
function editPlotLabel(it){const v=prompt("Label:",it.label);if(v!==null){it.label=v;renderPlotEditor();renderPreview();}}
function highlightSel(){document.querySelectorAll("#stagecanvas .pl-el").forEach(n=>{
  const on=n.dataset.id===selPlot;n.classList.toggle("sel",on);
  const it=S.plot.items.find(x=>x.id===n.dataset.id);
  n.style.zIndex=on?99:(it?zOf(it.type):3);
});}
function startDrag(e,it,el){
  if(e.target.classList.contains("pl-resize")||e.target.classList.contains("pl-ctl"))return;
  e.preventDefault();selPlot=it.id;highlightSel();
  const canvas=el.parentElement,r=canvas.getBoundingClientRect();
  try{el.setPointerCapture(e.pointerId);}catch(_){}
  const move=ev=>{
    it.x=Math.max(0,Math.min(100,snap(((ev.clientX-r.left)/r.width)*100)));
    it.y=Math.max(0,Math.min(100,snap(((ev.clientY-r.top)/r.height)*100)));
    el.style.left=it.x+"%";el.style.top=it.y+"%";
  };
  const up=()=>{el.removeEventListener("pointermove",move);el.removeEventListener("pointerup",up);renderPreview();};
  el.addEventListener("pointermove",move);el.addEventListener("pointerup",up);
}
function startResize(e,it,el){
  e.preventDefault();e.stopPropagation();
  const canvas=el.parentElement,r=canvas.getBoundingClientRect();
  try{el.setPointerCapture(e.pointerId);}catch(_){}
  const cx=r.left+r.width*it.x/100, cy=r.top+r.height*it.y/100;
  const move=ev=>{
    it.w=Math.max(4,Math.min(94,snap((Math.abs(ev.clientX-cx)*2/r.width)*100)));
    it.h=Math.max(4,Math.min(94,snap((Math.abs(ev.clientY-cy)*2/r.height)*100)));
    el.style.width=it.w+"%";el.style.height=it.h+"%";
  };
  const up=()=>{el.removeEventListener("pointermove",move);el.removeEventListener("pointerup",up);renderPreview();};
  el.addEventListener("pointermove",move);el.addEventListener("pointerup",up);
}

let AI_KEY=(function(){try{return localStorage.getItem("roborider_key")||"";}catch(e){return"";}})();

/* dispatcher: real model when a key is set, otherwise heuristic */
async function runAI(){
  const raw=$("aiInput").value;
  if(!raw.trim()){$("aiResult").textContent=L("ai_empty");return;}
  if(AI_KEY){return runAIModel(raw);}
  runAIHeuristic();
}
async function callOpenAI(system,user){
  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+AI_KEY},
    body:JSON.stringify({model:"gpt-4o-mini",temperature:0.2,response_format:{type:"json_object"},
      messages:[{role:"system",content:system},{role:"user",content:user}]})
  });
  if(!res.ok)throw new Error("API "+res.status);
  const j=await res.json();
  return JSON.parse(j.choices[0].message.content);
}
function mergeAI(obj){
  if(!obj||typeof obj!=="object")return;
  const b=obj.band||{}; ["name","subtitle","validUntil"].forEach(k=>{if(b[k])S.band[k]=b[k];});
  if(obj.intro)S.intro=obj.intro;
  if(Array.isArray(obj.contacts)&&obj.contacts.length)S.contacts=obj.contacts.map(c=>({role:c.role||"Contact",name:c.name||"",email:c.email||"",phone:c.phone||""}));
  if(Array.isArray(obj.travelParty)&&obj.travelParty.length)S.travelParty=obj.travelParty.map(x=>({label:x.label||"",count:String(x.count||"")}));
  if(obj.guests)S.guests=obj.guests;
  const H=obj.hospitality||{};
  ["dressing","towels","catering","buyout","snacks"].forEach(k=>{if(H[k])S.hosp[k]=H[k];});
  if(Array.isArray(H.dietary)&&H.dietary.length)S.hosp.dietary=H.dietary;
  if(Array.isArray(H.drinks)&&H.drinks.length)S.hosp.drinks=H.drinks.map(d=>({item:d.item||"",qty:String(d.qty||"")}));
  const T=obj.technical||{};
  ["soundcheck","stage","power","foh","monitors","pa","wireless"].forEach(k=>{if(T[k])S.tech[k]=T[k];});
  if(Array.isArray(T.crew)&&T.crew.length)S.tech.crew=T.crew.map(c=>({role:c.role||"",count:String(c.count||"")}));
  const Li=obj.lights||{}; ["fixtures","console","notes"].forEach(k=>{if(Li[k])S.lights[k]=Li[k];});
  if(obj.backline)S.backline=obj.backline;
  if(Array.isArray(obj.inputs)&&obj.inputs.length){
    S.inputs=obj.inputs.map((r,i)=>({ch:String(r.ch||i+1),input:r.input||"",micdi:r.micdi||"",p48:r.p48||"",stand:r.stand||"",pos:r.pos||r.position||"",notes:r.notes||""}));
  }
}
async function runAIModel(raw){
  $("aiResult").textContent="⏳ AI…";
  const schema=`Return STRICT JSON with this shape (omit unknown fields): {band:{name,subtitle,validUntil},intro,contacts:[{role,name,email,phone}],travelParty:[{label,count}],guests,hospitality:{dressing,towels,catering,dietary:[],buyout,drinks:[{item,qty}],snacks},technical:{soundcheck,crew:[{role,count}],stage,power,foh,monitors,pa,wireless},lights:{fixtures,console,notes},backline,inputs:[{ch,input,micdi,p48,stand,pos,notes}]}`;
  try{
    const obj=await callOpenAI(
      "You are a touring production assistant. Extract a band's technical & hospitality rider from the user's text into structured data. Use the same language as the user's text. p48 is 'X' if 48V phantom is needed. "+schema,
      raw);
    mergeAI(obj);renderForm();renderPreview();
    $("aiResult").textContent="✓ AI";
  }catch(e){
    $("aiResult").textContent="AI error ("+e.message+") — using demo parser.";
    runAIHeuristic();
  }
}
async function translateRider(){
  const target=$("langSel").value;
  if(!AI_KEY){alert("Translation of your own text needs an API key (top-right ✦ AI). Section labels already follow the Language selector.");return;}
  const btn=$("btnTranslate");const old=btn.textContent;btn.textContent="⏳";
  const payload={intro:S.intro,guests:S.guests,hosp:S.hosp,tech:S.tech,lights:S.lights,backline:S.backline,band:{subtitle:S.band.subtitle}};
  try{
    const obj=await callOpenAI(
      "Translate ALL human-readable string values in this rider JSON to the target language code '"+target+"'. Keep keys, structure, numbers, gear/brand names and channel input names unchanged. Return the same JSON shape.",
      JSON.stringify(payload));
    if(obj.intro!==undefined)S.intro=obj.intro;
    if(obj.guests!==undefined)S.guests=obj.guests;
    if(obj.band&&obj.band.subtitle)S.band.subtitle=obj.band.subtitle;
    if(obj.hosp)Object.assign(S.hosp,obj.hosp);
    if(obj.tech)Object.assign(S.tech,obj.tech);
    if(obj.lights)Object.assign(S.lights,obj.lights);
    if(obj.backline!==undefined)S.backline=obj.backline;
    renderForm();renderPreview();
  }catch(e){alert("Translation failed: "+e.message);}
  btn.textContent=old;
}
function runAIHeuristic(){
  const raw=$("aiInput").value;
  if(!raw.trim()){$("aiResult").textContent=L("ai_empty");return;}
  let found=[];
  const email=raw.match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
  const phone=raw.match(/(\+?\d[\d\s().-]{7,}\d)/);
  if(email||phone){
    if(!S.contacts[0])S.contacts=[{role:"Contact",name:"",email:"",phone:""}];
    if(email){S.contacts[0].email=email[0];found.push("email");}
    if(phone){S.contacts[0].phone=phone[0].trim();found.push("phone");}
  }
  const caps=raw.match(/^\s*([A-Z][A-Z0-9' ]{1,18})\s*$/m);
  if(caps&&!S.band.name){S.band.name=caps[1].trim();found.push("band name");}
  const tp=raw.match(/(?:travel\s*party|reisgezelschap|touring party|reisegruppe|équipe|bestaat uit|band\s*\+?\s*crew)\D{0,12}(\d{1,2})/i)||raw.match(/(\d{1,2})\s*[- ]?(?:koppige|piece|piéce|köpfige)/i)||raw.match(/(\d{1,2})\s*(?:persons|personen|personnes|personas|people)/i);
  if(tp){S.travelParty=[{label:"Band + crew",count:tp[1]}];found.push("travel party");}
  const bo=raw.match(/buy[\s-]?out[^€$\d]{0,12}[€$]?\s*(\d{1,3})/i)||raw.match(/[€$]\s*(\d{1,3})[,.]?-?\s*(?:p\.?p\.?|per person|pro person|par personne)/i);
  if(bo){S.hosp.buyout="€"+bo[1];found.push("buy-out");}
  const diet=[];
  if(/diabe|keto/i.test(raw))diet.push("Band member with diabetes — low-carb (keto)");
  if(/vegan/i.test(raw))diet.push("1× vegan");
  if(/vega|vegetar|végét/i.test(raw)&&!/vegan/i.test(raw))diet.push("1× vegetarian");
  const allerg=raw.match(/(no shrimp|geen garnalen|gluten[- ]?free|glutenvrij|lactose[- ]?free|nut allerg|notenallergie)/i);
  if(allerg)diet.push(allerg[1]);
  if(diet.length){S.hosp.dietary=diet;found.push(diet.length+" dietary");}
  const inLines=[...raw.matchAll(/^\s*(\d{1,2})[\s.)|]+([A-Za-z][A-Za-z0-9 \/&'+-]{2,30})/gm)];
  if(inLines.length>=3){
    S.inputs=inLines.slice(0,48).map(m=>({ch:m[1],input:m[2].trim(),micdi:"",p48:"",stand:"",pos:"",notes:""}));
    found.push(inLines.length+" input channels");
  }
  renderForm();renderPreview();
  $("aiResult").textContent=found.length?(L("ai_recognized")+found.join(", ")+L("ai_check")):L("ai_none");
}

/* ===================== Example (random, fictional) ===================== */
function _pick(a){return a[Math.floor(Math.random()*a.length)];}
function _int(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function _chance(p){return Math.random()<p;}
function _shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}

  bands:["Violet Static","Cobalt Hours","Paper Tigers","Mara Vale","Lowlight","Neon Hymns","The Driftwood","Saffron Road","Echo Mirage","Northern Glow","Halcyon Bay","Smoke & Ember","Wild Antenna","Marble Skies","Riverside Noise","Glasshouse","Tidal Veil","Golden Hour Club","Velvet Approach","Paper Moons"],
  subtitle:["Technical & Hospitality Rider","Tour Rider","Technical Rider","Live Rider"],
  first:["Sam","Noa","Liam","Ava","Finn","Mila","Luca","Ivy","Jonas","Lena","Max","Robin","Tess","Cas","Jade","Ruben","Sara","Bram","Nina","Daan"],
  last:["de Vries","Janssen","Bakker","Visser","Smit","Meijer","Hart","Stone","Rivers","Vance","Brandt","Koster","Novak","Ferro","Kane","Holt","Reyes","Vale","Mercer","Lund"],
  roles:["Tour manager","Tour manager & FOH","Production manager","Booking & advance"],
  domains:["example.com","example.org","mail.example","band-mgmt.example"]
};
function _person(){return _pick(EX.first)+" "+_pick(EX.last);}
function _email(name){return name.toLowerCase().replace(/[^a-z]+/g,".").replace(/^\.+|\.+$/g,"")+"@"+_pick(EX.domains);}
function _phone(){return "+31 6 "+_int(10,99)+" "+_int(10,99)+" "+_int(10,99)+" "+_int(10,99);}
function loadExample(){
  const lang=S.lang; S=blank(); S.lang=lang; selPlot=null;
  const formation=_pick(["solo","duo","trio","four","five","dj"]);
  const band=_pick(EX.bands);
  S.band={name:band, subtitle:_pick(EX.subtitle)+(_chance(.6)?(" "+_int(2026,2027)):""), validUntil:"", accent:_pick(["#1b1a17","#33405a","#3a4a3f","#5a3a3a","#46405a"]), logo:""};
  S.intro=_pick([
    "Thanks for having us. We keep it simple and friendly — let's make a great show together with your crew.",
    "We're an easy, well-prepared act. A few essentials below to keep the day smooth for everyone.",
    "Looking forward to playing your venue. Anything unclear, just call or email — we're happy to help."
  ]);
  const tm=_person();
  S.contacts=[{role:_pick(EX.roles),name:tm,email:_email(tm),phone:_phone()}];
  if(_chance(.5)){const p=_person();S.contacts.push({role:"FOH engineer",name:p,email:_email(p),phone:_phone()});}
  let members;
  if(formation==="solo") members=["lead-ac"];
  else if(formation==="duo") members=_pick([["lead-ac","keys"],["lead-ac","guitar"],["lead","keys"]]);
  else if(formation==="trio") members=["drums","bass","lead-guitar"];
  else if(formation==="four") members=["drums","bass","guitar","lead-keys"];
  else if(formation==="five") members=_pick([["drums","bass","guitar","keys","lead"],["drums","bass","guitar","guitar2","lead-keys"]]);
  else members=["dj"];
  const partyCount = formation==="solo"?_int(1,2):formation==="duo"?_int(2,3):formation==="dj"?_int(1,3):_int(4,8);
  S.travelParty=[{label:"Band + crew",count:String(partyCount)}];
  S.guests=_pick(["10 guest spots per show.","Guest list of "+_int(6,20)+" per show.","A few guest spots, list on the day."]);
  S.hosp.dressing="Clean, lockable dressing room for "+partyCount+" people\nHeating/AC, water, mirror, WiFi + password";
  S.hosp.towels=_int(partyCount,partyCount+4)+" clean towels";
  S.hosp.catering=_pick(["Warm, healthy meal for the party — no fast food.","A fresh hot meal on arrival, please.","Catering for the full party; veggie-friendly appreciated."]);
  S.hosp.dietary=_shuffle(["1× vegetarian","1× vegan","1× gluten-free","1× no nuts","1× no shrimp","1× lactose-free"]).slice(0,_int(0,2));
  if(S.hosp.dietary.length===0)S.hosp.dietary=[""];
  S.hosp.buyout="€"+_pick([20,25,30]);
  S.hosp.drinks=_shuffle([{item:"Water (still)",qty:"12"},{item:"Water (sparkling)",qty:"6"},{item:"Soft drinks",qty:"12"},{item:"Beer (local)",qty:String(_int(12,24))},{item:"Coffee & tea",qty:"unlimited"},{item:"Energy drink",qty:"6"},{item:"Dry white wine",qty:"1"}]).slice(0,_int(3,5));
  S.hosp.snacks=_pick(["Fruit, nuts and chocolate.","Some fresh fruit and crisps.","Healthy snacks appreciated."]);
  const w=(formation==="solo"||formation==="dj")?_int(5,7):_int(7,10);
  const d=_int(5,7);
  S.tech.soundcheck=_pick(["Allow ~45 min setup, 20 min changeover.","About 1 hour setup; 30 min changeover.","Quick line check if risers are pre-built."]);
  const crew=[{role:"Sound engineer (house)",count:"1"},{role:"Stagehand",count:String(_int(1,2))}];
  if(formation!=="solo"&&formation!=="dj")crew.push({role:"Lighting tech",count:"1"});
  S.tech.crew=crew;
  S.tech.stage="Stable stage, min. "+w+" m wide × "+d+" m deep."+((formation==="four"||formation==="five")?" 1–2 risers for keys/drums.":"");
  S.tech.power="230V at marked positions.";
  S.tech.foh=_pick(["House console fine (no Behringer X32, please).","We bring our own console; 1× CAT to FOH.","Any decent digital console with 24+ channels."]);
  S.tech.monitors=formation==="dj"?"2 wedges at the booth.":("IEM/wedges as per input list; "+_int(2,5)+" mixes.");
  S.tech.pa="Full-range, even coverage (L-Acoustics, d&b, Adamson or equivalent).";
  S.tech.wireless=_chance(.5)?"1× wireless handheld from the house.":"";
  S.backline=_pick(["We bring our own backline.","House backline requested — list on advance.","Mostly our own; drum shells from house."]);
  S.inputs=[];
  const add=(input,micdi,p48,pos,notes)=>S.inputs.push({ch:"",input:input,micdi:micdi||"",p48:p48||"",stand:"",pos:pos||"",notes:notes||""});
  if(members.includes("drums")){add("Kick","Mic","","Drums");add("Snare","SM57","","Drums");add("Hihat","Mic","X","Drums");add("OH L","Mic","X","Drums");add("OH R","Mic","X","Drums");}
  if(members.includes("bass")) add("Bass DI","DI","","Bass");

  if(members.includes("lead-ac")) add("Ac. Guitar","DI","X","Centre");
  if(members.includes("dj")){add("Playback L","DI","X","DJ");add("Playback R","DI","X","DJ");}

  renumberInputs();
  S.plot.items=[];

  if(members.includes("drums")) P("drums",_chance(.5)?52:50,24);

  if(members.includes("bass")) P("bass",20,52);
  if(members.includes("guitar")||members.includes("lead-guitar")) P("guitar",78,52);

  if(members.includes("dj")) P("keys",50,30,{label:"DJ"});
  if(members.includes("lead-ac")) P("vocal",50,46,{label:"LEAD"});
  if(!members.includes("lead-ac")&&!members.includes("dj")) P("vocal",50,62);
  const monN=(formation==="solo")?1:_int(2,4);
  for(let i=0;i<monN;i++){const x=(monN===1)?20:(18+i*(64/(monN-1)));P("monitor",Math.round(x),74);}
  if(_chance(.7)) P("power",12,40);
  if(_chance(.5)) P("power",86,40);
  S.stageplot="";
  applyChrome();renderForm();renderPreview();
  if($("aiResult"))$("aiResult").textContent="";
}
