  .pl-el{position:absolute;transform:translate(-50%,-50%);user-select:none;cursor:grab}
  .pl-shape{width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;font-family:var(--display);font-weight:400;letter-spacing:.5px;text-transform:uppercase;
    font-size:2.3cqh;line-height:1.05;border:1px solid var(--ink);border-radius:0;background:#fff;overflow:hidden;padding:2px;color:var(--ink);
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pl-shape.sh-circle{border-radius:50%}
  .pl-shape.sh-riser{border-style:dashed}
  .pl-risercap{position:absolute;left:50%;bottom:100%;transform:translateX(-50%);margin-bottom:2px;z-index:8;
    font-family:var(--display);font-size:1.7cqh;line-height:1;white-space:nowrap;background:#efe9dc;
    border:1px solid var(--ink);padding:2px 5px;color:var(--ink);pointer-events:none;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pl-risercap.below{bottom:auto;top:100%;margin-bottom:0;margin-top:2px}
  .pl-shape.sh-text{border:none;background:transparent!important}
  .pl-el.sel .pl-shape{box-shadow:0 0 0 2px var(--clay)}
  .pl-ctl{position:absolute;top:-9px;width:19px;height:19px;border-radius:50%;border:none;color:#fff;font-size:12px;line-height:19px;
    text-align:center;cursor:pointer;display:none;z-index:6;padding:0}
  .pl-el:hover .pl-ctl,.pl-el.sel .pl-ctl{display:block}
  .pl-del{right:-9px;background:var(--ink)}
  .pl-rot{left:-9px;background:var(--clay)}
  .pl-resize{position:absolute;right:-7px;bottom:-7px;width:15px;height:15px;background:#fff;border:2px solid var(--clay);
    border-radius:0;cursor:nwse-resize;display:none;z-index:6}
  .pl-el:hover .pl-resize,.pl-el.sel .pl-resize{display:block}
  /* read-only plot in the rider preview */
  .plot-preview{position:relative;width:100%;aspect-ratio:16/10;border:1px solid var(--ink);border-radius:0;
    container-type:size;background:#fff;margin-top:4px}
  .plot-preview .pl-el{cursor:default}
  /* zoom bar + mobile editor */
  .plot-bar{display:flex;align-items:center;gap:12px;padding:10px 16px 0}
  .plot-bar .plot-hint{flex:1;font-size:12px;color:var(--muted)}
  .plot-zoom{display:flex;align-items:center;gap:4px;flex:0 0 auto}
  .plot-zoom button{border:1px solid var(--hair);background:#fff;color:var(--ink);font-family:var(--display);font-size:13px;min-width:36px;height:32px;padding:0 8px;cursor:pointer}
  .plot-zoom button:active{background:var(--paper2)}
  .stage-scroll{touch-action:none}
  #stagecanvas{transform-origin:0 0}
  .plot-list{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;border-top:1px solid var(--hair);max-height:90px;overflow:auto}
  .plot-list:empty{display:none}
  .plot-list .pli{display:flex;align-items:center;gap:6px;border:1px solid var(--hair);background:#fff;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--soft);white-space:nowrap}
  .plot-list .pli.on{border-color:var(--clay);color:var(--ink);box-shadow:inset 0 0 0 1px var(--clay)}
  .plot-list .pli b{font-weight:500}
  .plot-tools{display:flex;justify-content:center;gap:14px;padding:10px 12px;border-top:1px solid var(--hair);background:var(--bg);flex-wrap:wrap}
  .plot-tools[hidden]{display:none}
  .plot-tools .pt-group{display:flex;gap:6px}
  .plot-tools button{width:46px;height:46px;border:1px solid var(--hair);background:#fff;font-size:18px;color:var(--ink);border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
  .plot-tools button:active{background:var(--paper2)}
  .plot-tools .pt-del{border-color:#c98b8b;color:#a85a5a}
  .pal-toggle{display:none}
  .rotate-tip{display:none}
  @media(max-width:820px){
    .modal{width:100vw;height:100dvh;max-width:none;max-height:none}
    .stage-scroll{flex:1;padding:12px}
    .palette{display:none;gap:6px;padding:10px 14px;max-height:42vh;overflow:auto;border-bottom:1px solid var(--hair)}
    #plotModal.pal-open .palette{display:flex}
    .palette button{padding:11px 12px;font-size:11px}
    .pal-toggle{display:block;width:calc(100% - 32px);margin:12px 16px 0;padding:13px;border:1px solid var(--ink);background:var(--ink);color:var(--bg);
      font-family:var(--display);font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
    #plotModal.pal-open .pal-toggle{background:var(--bg);color:var(--ink)}
    .plot-bar .plot-hint{display:none}
    .plot-list{display:none}
    .rotate-tip{display:block;text-align:center;font-size:11px;color:var(--muted);padding:7px 12px 2px}
    .plot-tools{position:fixed;left:0;right:0;bottom:0;z-index:120;border-top:1px solid var(--hair);box-shadow:0 -10px 26px -18px rgba(0,0,0,.55)}
    .pl-ctl,.pl-resize{display:none!important}
  }
  @media(max-width:820px) and (orientation:landscape){
    .rotate-tip{display:none}
  }
  @media print{
    .topbar,.editor,.ai-box,.mobile-tabs{display:none!important}
    .layout{display:block;height:auto}
    .preview-wrap{display:block!important;padding:0;background:#fff;overflow:visible}
    .page{box-shadow:none;margin:0;max-width:100%;padding:24mm 18mm;page-break-after:always}
    .page:last-child{page-break-after:auto}
    /* long input list: never split a row, repeat the header on each printed page */
    table.grid{page-break-inside:auto}
    table.grid thead{display:table-header-group}
    table.grid tr{page-break-inside:avoid;break-inside:avoid}
    h3.sub-h{page-break-after:avoid}
    @page{size:A4;margin:0}
  }
</style>
</head>

</div>

    <div id="formMount"></div>

<!-- Stage plot editor modal -->
<div class="modal-bg" id="plotModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="plotTitle"></h3>
      <span class="spacer"></span>
      <button class="btn ghost" id="plotClear" onclick="clearPlot()"></button>
      <button class="btn primary" id="plotDone" onclick="closePlotModal()"></button>
    </div>
    <button type="button" class="pal-toggle" id="plotAddBtn" onclick="togglePalette()">+ <span id="plotAddLbl">Add element</span></button>
    <div class="palette" id="plotPalette"></div>
    <div class="plot-bar">
      <div class="plot-hint" id="plotHint"></div>
      <div class="plot-zoom">
        <button type="button" onclick="plotZoomBy(-0.25)" aria-label="Zoom out">−</button>
        <button type="button" id="plotZoomLbl" onclick="plotZoomReset()">100%</button>
        <button type="button" onclick="plotZoomBy(0.25)" aria-label="Zoom in">+</button>
      </div>
    </div>
    <div class="rotate-tip" id="rotateTip"></div>
    <div class="stage-scroll" id="stageScroll">
      <div class="stagecanvas" id="stagecanvas" onclick="if(event.target===this){selPlot=null;highlightSel();}">
        <div class="stage-front" id="stageFront"></div>
      </div>
    </div>
    <div class="plot-list" id="plotList"></div>
    <div class="plot-tools" id="plotTools" hidden>
      <div class="pt-group">
        <button type="button" onclick="plotNudge(-1,0)" aria-label="Move left">◀</button>
        <button type="button" onclick="plotNudge(0,-1)" aria-label="Move up">▲</button>
        <button type="button" onclick="plotNudge(0,1)" aria-label="Move down">▼</button>
        <button type="button" onclick="plotNudge(1,0)" aria-label="Move right">▶</button>
      </div>
      <div class="pt-group">
        <button type="button" onclick="plotSize(-1)" aria-label="Smaller">－</button>
        <button type="button" onclick="plotSize(1)" aria-label="Bigger">＋</button>
        <button type="button" onclick="plotRotateSel()" aria-label="Rotate">↻</button>
      </div>
      <div class="pt-group">
        <button type="button" onclick="plotDuplicateSel()" aria-label="Duplicate">⧉</button>
        <button type="button" onclick="plotEditLabelSel()" aria-label="Edit label">✎</button>
        <button type="button" class="pt-del" onclick="plotDeleteSel()" aria-label="Delete">🗑</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="acctModal">

  </div>
</div>

let PRO=false; try{PRO=!!localStorage.getItem("rr_pro");}catch(e){}
function updateProUI(){
  const b=$("btnPro");
  if(b){ b.textContent=PRO?("✓ "+L("pro_on")):("✦ "+L("pro_cta")); b.classList.toggle("procta",!PRO); }
  document.body.classList.toggle("free",!PRO);
}
function deactivatePro(){try{localStorage.removeItem("rr_pro");}catch(e){}PRO=false;updateProUI();renderPreview();}
function openProModal(){
  $("proTitle").textContent="RoboRider Pro";
  const needLogin = !!sb && !user && !PRO;
  let status = PRO?L("pro_status_on"):L("pro_status_free");
  if(needLogin) status += " " + L("pro_login_hint");
  $("proStatusLine").textContent=status;
  if($("proLoginBtn")){ $("proLoginBtn").textContent=L("pro_login_btn"); $("proLoginBtn").style.display=needLogin?"block":"none"; }
  $("proSubBtn").textContent=L("pro_sub_btn");
  $("proOr").textContent=L("pro_or");
  $("proKeyLbl").textContent=L("pro_key_lbl");
  $("proActBtn").textContent=L("pro_act");
  $("proRemoveBtn").textContent=L("pro_remove");
  $("proSubBtn").style.display=PRO?"none":"block";
  $("proManageWrap").style.display=PRO?"block":"none";
  $("proMsg").textContent="";
  $("proModal").classList.add("open");
}
function closeProModal(){$("proModal").classList.remove("open");}
function proSubscribe(){ if(CHECKOUT_URL.indexOf("REPLACE")>=0){$("proMsg").textContent=L("pro_soon");}else{window.open(CHECKOUT_URL,"_blank");} }
async function proActivate(){
  const key=($("proKeyInput").value||"").trim(); if(!key){$("proMsg").textContent=L("pro_enter");return;}
  if(sb && !user){ $("proMsg").textContent=L("pro_need_login"); setTimeout(function(){closeProModal();openAcctModal();},1000); return; }
  $("proMsg").textContent="⏳"; $("proActBtn").disabled=true;
  try{
    const r=await fetch("https://api.lemonsqueezy.com/v1/licenses/validate",{method:"POST",headers:{"Accept":"application/json","Content-Type":"application/x-www-form-urlencoded"},body:"license_key="+encodeURIComponent(key)});
    const j=await r.json();
    if(j&&j.valid){try{localStorage.setItem("rr_pro",key);}catch(_){}if(sb&&user){try{await sb.from("profiles").update({is_pro:true,license_key:key}).eq("id",user.id);}catch(_){}}PRO=true;updateProUI();renderPreview();$("proMsg").textContent=L("pro_ok");setTimeout(closeProModal,1100);}
    else{$("proMsg").textContent=L("pro_bad");}
  }catch(err){$("proMsg").textContent=L("pro_err");}
  $("proActBtn").disabled=false;
}

async function initAuth(){
  if(!sb){ updateAccountUI(); return; }
  try{
    const {data}=await sb.auth.getSession();
    user=data&&data.session?data.session.user:null;
    sb.auth.onAuthStateChange((_e,s)=>{ user=s?s.user:null; onAuthChange(); });
  }catch(e){}
  onAuthChange();
}
async function onAuthChange(){
  updateAccountUI();
  if(user){ await loadProfilePro(); const list=await refreshRiderList(); maybeAutoOpenLast(list); }
  else { currentRiderId=null; }
}
function isBlankState(){
  try{ const b=blank(); b.lang=S.lang; const cur=Object.assign({},S); cur.lang=S.lang; return JSON.stringify(b)===JSON.stringify(cur); }
  catch(e){ return false; }
}
function maybeAutoOpenLast(list){
  if(sharedMode) return;              // viewing a shared rider — don't override
  if(currentRiderId) return;          // already working on a saved rider
  if(!list||!list.length) return;     // nothing saved yet
  if(!isBlankState()) return;         // don't overwrite work in progress
  cloudLoad(list[0].id);              // open most recently updated rider
}
function updateAccountUI(){
  const b=$("btnAccount"); const cs=$("btnCloudSave");
  if(!b) return;
  if(!sb || sharedMode){ b.style.display="none"; if(cs)cs.style.display="none"; return; }
  b.style.display="";
  b.textContent = user ? ("✓ "+L("acct_btn_in")) : L("acct_btn_out");
  if(cs){ cs.style.display = user ? "" : "none"; cs.textContent = "☁ "+L("acct_cloud_save"); }
}
function openAcctModal(){
  if(!sb) return;
  $("acctTitle").textContent=L("acct_title");
  $("acctIntro").textContent=L("acct_intro");
  $("acctEmailLbl").textContent=L("acct_email");
  $("acctSendBtn").textContent=L("acct_send");
  $("acctLangLbl").textContent=L("acct_lang");
  $("acctSaveLbl").textContent=L("acct_save_lbl");
  $("acctSaveBtn").textContent=L("acct_save_btn");
  $("acctLogoutBtn").textContent=L("acct_logout");
  $("acctMsg").textContent="";
  const inq=!!user;
  $("acctLogin").style.display=inq?"none":"block";
  $("acctIn").style.display=inq?"block":"none";
  if(inq){
    $("acctWho").textContent=L("acct_who").replace("{email}", user.email||"");
    if($("acctLang")) $("acctLang").value=S.lang;
    if(!$("acctRiderName").value) $("acctRiderName").value=(S.band&&S.band.name)||"";
    refreshRiderList();
  }
  $("acctModal").classList.add("open");
}
function closeAcctModal(){ $("acctModal").classList.remove("open"); }
async function sendMagicLink(){
  const email=($("acctEmail").value||"").trim();
  if(!email){ $("acctMsg").textContent=L("acct_need_email"); return; }
  $("acctMsg").textContent="⏳"; $("acctSendBtn").disabled=true;
  try{
    const redir=location.href.split("#")[0];
    const {error}=await sb.auth.signInWithOtp({email, options:{emailRedirectTo:redir}});
    $("acctMsg").textContent=error?L("acct_err"):L("acct_sent");
  }catch(e){ $("acctMsg").textContent=L("acct_err"); }
  $("acctSendBtn").disabled=false;
}
async function signOut(){
  try{ await sb.auth.signOut(); }catch(e){}
  user=null; currentRiderId=null;
  try{ if(!localStorage.getItem("rr_pro")){ PRO=false; updateProUI(); renderPreview(); } }catch(_){}
  updateAccountUI(); closeAcctModal();
}
async function loadProfilePro(){
  if(!sb||!user) return;
  try{
    const {data}=await sb.from("profiles").select("*").eq("id",user.id).maybeSingle();
    if(data){
      if(data.is_pro){ PRO=true; updateProUI(); renderPreview(); }
      if(data.lang && data.lang!==S.lang){ setLang(data.lang); }  // open in the user's preferred language
    }
  }catch(e){}
}
function setAcctLang(v){ setLang(v); }  // setLang persists to the profile when logged in
async function refreshRiderList(){
  if(!sb||!user) return null;
  const box=$("acctList"); if(!box) return null;
  try{
    const {data}=await sb.from("riders").select("id,title,updated_at").eq("user_id",user.id).order("updated_at",{ascending:false});
    riderCount=(data&&data.length)||0;
    if(!data||!data.length){ box.innerHTML='<p class="hint" style="margin:0">'+esc(L("acct_empty"))+'</p>'; return data; }
    box.innerHTML=data.map(function(r){
      const d=new Date(r.updated_at); const ds=isNaN(d.getTime())?"":d.toLocaleDateString();
      return '<div style="display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--hair);font-size:13px">'
        +'<span style="flex:1;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.title||"—")+'</span>'
        +'<span style="color:var(--muted);font-size:11px;flex:0 0 auto">'+ds+'</span>'
        +'<button class="btn ghost" style="padding:5px 9px;font-size:11px;flex:0 0 auto" onclick="cloudLoad(\''+r.id+'\')">'+esc(L("acct_load"))+'</button>'
        +'<button class="btn ghost" style="padding:5px 9px;font-size:11px;flex:0 0 auto" onclick="cloudDuplicate(\''+r.id+'\')">'+esc(L("acct_dup"))+'</button>'

function bulletize(text){
  if(!text||!text.trim()) return "";

/* ===================== Mobile section stepper ===================== */
let curStep=0, _stepRT;
function isStepMode(){ try{return window.matchMedia("(max-width:820px)").matches;}catch(e){return false;} }
function applySteps(){
  const mount=$("formMount"); if(!mount) return;
  const secs=Array.prototype.slice.call(mount.querySelectorAll("details.sec"));
  const nav=$("secNav"), bottom=$("stepNav");
  if(!secs.length || !isStepMode() || document.body.classList.contains("shared")){
    document.body.classList.remove("stepmode");
    secs.forEach(s=>s.classList.remove("step-active"));
    if(nav)nav.innerHTML=""; if(bottom)bottom.innerHTML="";
    return;
  }
  document.body.classList.add("stepmode");
  const total=secs.length;
  if(curStep>total-1)curStep=total-1;
  if(curStep<0)curStep=0;
  const titleOf=function(i){const sm=secs[i].querySelector("summary");return sm?sm.textContent.replace(/^\s*\d+\s*/,"").replace("›","").trim():("Sectie "+(i+1));};
  if(nav){
    const pct=Math.round(((curStep+1)/total)*100);
    const chips=secs.map(function(s,i){
      const c=i===curStep?"on":(i<curStep?"done":"");
      return '<button class="secchip '+c+'" onclick="goStep('+i+')" aria-label="Sectie '+(i+1)+'">'+(i+1)+'</button>';
    }).join("");
    nav.innerHTML='<div class="stepbar"><span style="width:'+pct+'%"></span></div>'
      +'<div class="stepcount">'+esc(L("step_count").replace("{n}",curStep+1).replace("{t}",total))+'</div>'
      +'<div class="steptitle">'+esc(titleOf(curStep))+'</div>'
      +'<div class="stepchips">'+chips+'</div>';
  }
  secs.forEach(function(s,i){ const a=i===curStep; s.classList.toggle("step-active",a); if(a)s.open=true; });
  if(bottom){
    let html = curStep>0
      ? '<button class="btn ghost" onclick="goStep('+(curStep-1)+')">‹ '+esc(L("step_prev"))+'</button>'
      : '<span style="flex:1"></span>';
    html += curStep<total-1
      ? '<button class="btn primary" onclick="goStep('+(curStep+1)+')">'+esc(L("step_next"))+': '+esc(titleOf(curStep+1))+' ›</button>'
      : '<button class="btn primary" onclick="setView(\'preview\')">'+esc(L("step_preview"))+' ›</button>';
    bottom.innerHTML=html;
  }
  const on=nav?nav.querySelector(".secchip.on"):null;
  if(on&&on.scrollIntoView){ try{on.scrollIntoView({inline:"center",block:"nearest"});}catch(e){} }
}
function goStep(i){ curStep=i; applySteps();
  try{
    if(isStepMode()){
      const tabs=document.querySelector(".mobile-tabs"), nav=$("secNav");
      const off=(tabs?tabs.offsetHeight:0)+(nav?nav.offsetHeight:0)+10;
      const fm=document.querySelector("#formMount details.sec.step-active")||$("formMount");
      const y=window.pageYOffset+fm.getBoundingClientRect().top-off;
      window.scrollTo(0,Math.max(0,y));
    } else { window.scrollTo(0,0); }
  }catch(e){ try{window.scrollTo(0,0);}catch(_){}}
}
window.addEventListener("resize",function(){ clearTimeout(_stepRT); _stepRT=setTimeout(applySteps,150); });

function downscaleDataURL(src,max,q,cb){try{
  const img=new Image();
  img.onload=()=>{let w=img.width,h=img.height;
    if(w<=max&&h<=max){cb(src);return;}
    const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    const png=/^data:image\/png/.test(src);
    cb(png?c.toDataURL("image/png"):c.toDataURL("image/jpeg",q));};
  img.onerror=()=>cb(src);img.src=src;
}catch(e){cb(src);}}

function startDrag(e,it,el){
  if(e.target.classList.contains("pl-resize")||e.target.classList.contains("pl-ctl"))return;
  if(gesturing)return;
  e.preventDefault();selPlot=it.id;highlightSel();
  const canvas=el.parentElement,r=canvas.getBoundingClientRect();
  try{el.setPointerCapture(e.pointerId);}catch(_){}
  const move=ev=>{
    if(gesturing)return;
    it.x=Math.max(0,Math.min(100,snap(((ev.clientX-r.left)/r.width)*100)));
    it.y=Math.max(0,Math.min(100,snap(((ev.clientY-r.top)/r.height)*100)));
    el.style.left=it.x+"%";el.style.top=it.y+"%";
  };
  const up=()=>{el.removeEventListener("pointermove",move);el.removeEventListener("pointerup",up);renderPreview();};
  el.addEventListener("pointermove",move);el.addEventListener("pointerup",up);
}
function startResize(e,it,el){
  e.preventDefault();e.stopPropagation();
  const canvas=el.parentElement,r=canvas.getBoundingClientRect();
  try{el.setPointerCapture(e.pointerId);}catch(_){}
  const cx=r.left+r.width*it.x/100, cy=r.top+r.height*it.y/100;
  const move=ev=>{
    it.w=Math.max(4,Math.min(94,snap((Math.abs(ev.clientX-cx)*2/r.width)*100)));
    it.h=Math.max(4,Math.min(94,snap((Math.abs(ev.clientY-cy)*2/r.height)*100)));
    el.style.width=it.w+"%";el.style.height=it.h+"%";
  };
  const up=()=>{el.removeEventListener("pointermove",move);el.removeEventListener("pointerup",up);renderPreview();};
  el.addEventListener("pointermove",move);el.addEventListener("pointerup",up);
}

function updatePlotTools(){const t=$("plotTools");if(!t)return;t.hidden=!(selPlot&&plotIsMobile());}
function plotApplyZoom(){const c=$("stagecanvas");if(c)c.style.transform="scale("+plotZoom+")";}
function updateZoomLabel(){const l=$("plotZoomLbl");if(l)l.textContent=Math.round(plotZoom*100)+"%";}
function plotZoomBy(d){plotZoom=Math.max(0.5,Math.min(3,Math.round((plotZoom+d)*100)/100));plotApplyZoom();updateZoomLabel();}
function plotZoomReset(){plotZoom=1;plotApplyZoom();updateZoomLabel();}
function initPlotGestures(){
  const sc=$("stageScroll");if(!sc||sc._g)return;sc._g=1;
  const pts=new Map();let startDist=0,startZoom=1,panStart=null;
  sc.addEventListener("pointerdown",e=>{
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===2){gesturing=true;const a=[...pts.values()];startDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y)||1;startZoom=plotZoom;panStart=null;}
    else if(pts.size===1&&e.target&&e.target.id==="stagecanvas"){panStart={x:e.clientX,y:e.clientY,l:sc.scrollLeft,t:sc.scrollTop};}
  });
  sc.addEventListener("pointermove",e=>{
    if(!pts.has(e.pointerId))return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size>=2){
      e.preventDefault();const a=[...pts.values()];
      const dist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y)||1;
      const mid={x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2};
      const rect=sc.getBoundingClientRect();const mrx=mid.x-rect.left,mry=mid.y-rect.top;
      const oldZoom=plotZoom;const z=Math.max(0.5,Math.min(3,startZoom*(dist/startDist)));
      const cX=(sc.scrollLeft+mrx)/oldZoom,cY=(sc.scrollTop+mry)/oldZoom;
      plotZoom=z;plotApplyZoom();updateZoomLabel();
      sc.scrollLeft=cX*z-mrx;sc.scrollTop=cY*z-mry;
    } else if(panStart){e.preventDefault();sc.scrollLeft=panStart.l-(e.clientX-panStart.x);sc.scrollTop=panStart.t-(e.clientY-panStart.y);}
  });
  const end=e=>{pts.delete(e.pointerId);if(pts.size<2)gesturing=false;if(pts.size===0)panStart=null;};
  sc.addEventListener("pointerup",end);sc.addEventListener("pointercancel",end);
}
function openPlotModal(){plotZoom=1;$("plotModal").classList.add("open");renderPlotEditor();updateZoomLabel();initPlotGestures();}
function closePlotModal(){$("plotModal").classList.remove("open");renderForm();renderPreview();}

/* Custom suggestion dropdown for the Mic/DI field.
   Replaces <datalist>, which renders/scrolls badly on iOS Safari. */
let _suggEl=null,_suggFor=null;
function showMicSugg(inp){
  const q=(inp.value||"").trim().toLowerCase();
  const opts=MICS.filter(m=>!q||m.toLowerCase().indexOf(q)>=0);
  if(!opts.length){hideMicSugg();return;}
  if(!_suggEl){_suggEl=document.createElement("div");_suggEl.className="sugg";document.body.appendChild(_suggEl);}
  _suggFor=inp;
  _suggEl.innerHTML=opts.map(m=>`<div class="sugg-opt" data-v="${esc(m)}">${esc(m)}</div>`).join("");
  _suggEl.querySelectorAll(".sugg-opt").forEach(o=>o.addEventListener("pointerdown",ev=>{ev.preventDefault();pickMicSugg(o.dataset.v);}));
  const r=inp.getBoundingClientRect();
  const below=window.innerHeight-r.bottom;
  _suggEl.style.left=Math.max(6,Math.min(r.left,window.innerWidth-186))+"px";
  _suggEl.style.width=Math.max(r.width,170)+"px";
  const H=Math.min(200,opts.length*39+2);
  if(below>H+10||below>r.top){
    _suggEl.style.top=(r.bottom+3)+"px";_suggEl.style.bottom="auto";
    _suggEl.style.maxHeight=Math.max(80,Math.min(200,below-10))+"px";
  }else{
    _suggEl.style.top="auto";_suggEl.style.bottom=(window.innerHeight-r.top+3)+"px";
    _suggEl.style.maxHeight=Math.max(80,Math.min(200,r.top-10))+"px";
  }
  _suggEl.style.display="block";
}
function pickMicSugg(v){
  if(!_suggFor)return;

}

/* ===================== AI import & translation ===================== */
let AI_KEY=(function(){try{return localStorage.getItem("roborider_key")||"";}catch(e){return"";}})();
function setAIKey(v){AI_KEY=v.trim();try{localStorage.setItem("roborider_key",AI_KEY);}catch(e){}updateAIBadge();}
function updateAIBadge(){const b=$("aiKeyState");if(b)b.textContent=AI_KEY?"● live AI":"○ demo";}
function promptAIKey(){
  const v=prompt("OpenAI API key (sk-…). Stored only in this browser (localStorage). Leave empty to use offline demo mode.",AI_KEY);
  if(v!==null)setAIKey(v);
}
/* dispatcher: real model when a key is set, otherwise heuristic */
async function runAI(){
  const raw=$("aiInput").value;
  if(!raw.trim()){$("aiResult").textContent=L("ai_empty");return;}
  if(AI_KEY){return runAIModel(raw);}
  runAIHeuristic();
}
async function callOpenAI(system,user){
  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+AI_KEY},
    body:JSON.stringify({model:"gpt-4o-mini",temperature:0.2,response_format:{type:"json_object"},
      messages:[{role:"system",content:system},{role:"user",content:user}]})
  });
  if(!res.ok)throw new Error("API "+res.status);
  const j=await res.json();
  return JSON.parse(j.choices[0].message.content);
}
function mergeAI(obj){
  if(!obj||typeof obj!=="object")return;
  const b=obj.band||{}; ["name","subtitle","validUntil"].forEach(k=>{if(b[k])S.band[k]=b[k];});
  if(obj.intro)S.intro=obj.intro;
  if(Array.isArray(obj.contacts)&&obj.contacts.length)S.contacts=obj.contacts.map(c=>({role:c.role||"Contact",name:c.name||"",email:c.email||"",phone:c.phone||""}));
  if(Array.isArray(obj.travelParty)&&obj.travelParty.length)S.travelParty=obj.travelParty.map(x=>({label:x.label||"",count:String(x.count||"")}));
  if(obj.guests)S.guests=obj.guests;
  const H=obj.hospitality||{};
  ["dressing","towels","catering","buyout","snacks"].forEach(k=>{if(H[k])S.hosp[k]=H[k];});
  if(Array.isArray(H.dietary)&&H.dietary.length)S.hosp.dietary=H.dietary;
  if(Array.isArray(H.drinks)&&H.drinks.length)S.hosp.drinks=H.drinks.map(d=>({item:d.item||"",qty:String(d.qty||"")}));
  const T=obj.technical||{};
  ["soundcheck","stage","power","foh","monitors","pa","wireless"].forEach(k=>{if(T[k])S.tech[k]=T[k];});
  if(Array.isArray(T.crew)&&T.crew.length)S.tech.crew=T.crew.map(c=>({role:c.role||"",count:String(c.count||"")}));
  const Li=obj.lights||{}; ["fixtures","console","notes"].forEach(k=>{if(Li[k])S.lights[k]=Li[k];});
  if(obj.backline)S.backline=obj.backline;
  if(Array.isArray(obj.inputs)&&obj.inputs.length){
    S.inputs=obj.inputs.map((r,i)=>({ch:String(r.ch||i+1),input:r.input||"",micdi:r.micdi||"",p48:r.p48||"",stand:r.stand||"",pos:r.pos||r.position||"",notes:r.notes||""}));
  }
}
async function runAIModel(raw){
  $("aiResult").textContent="⏳ AI…";
  const schema=`Return STRICT JSON with this shape (omit unknown fields): {band:{name,subtitle,validUntil},intro,contacts:[{role,name,email,phone}],travelParty:[{label,count}],guests,hospitality:{dressing,towels,catering,dietary:[],buyout,drinks:[{item,qty}],snacks},technical:{soundcheck,crew:[{role,count}],stage,power,foh,monitors,pa,wireless},lights:{fixtures,console,notes},backline,inputs:[{ch,input,micdi,p48,stand,pos,notes}]}`;
  try{
    const obj=await callOpenAI(
      "You are a touring production assistant. Extract a band's technical & hospitality rider from the user's text into structured data. Use the same language as the user's text. p48 is 'X' if 48V phantom is needed. "+schema,
      raw);
    mergeAI(obj);renderForm();renderPreview();
    $("aiResult").textContent="✓ AI";
  }catch(e){
    $("aiResult").textContent="AI error ("+e.message+") — using demo parser.";
    runAIHeuristic();
  }
}
async function translateRider(){
  const target=$("langSel").value;
  if(!AI_KEY){alert("Translation of your own text needs an API key (top-right ✦ AI). Section labels already follow the Language selector.");return;}
  const btn=$("btnTranslate");const old=btn.textContent;btn.textContent="⏳";
  const payload={intro:S.intro,guests:S.guests,hosp:S.hosp,tech:S.tech,lights:S.lights,backline:S.backline,band:{subtitle:S.band.subtitle}};
  try{
    const obj=await callOpenAI(
      "Translate ALL human-readable string values in this rider JSON to the target language code '"+target+"'. Keep keys, structure, numbers, gear/brand names and channel input names unchanged. Return the same JSON shape.",
      JSON.stringify(payload));
    if(obj.intro!==undefined)S.intro=obj.intro;
    if(obj.guests!==undefined)S.guests=obj.guests;
    if(obj.band&&obj.band.subtitle)S.band.subtitle=obj.band.subtitle;
    if(obj.hosp)Object.assign(S.hosp,obj.hosp);
    if(obj.tech)Object.assign(S.tech,obj.tech);
    if(obj.lights)Object.assign(S.lights,obj.lights);
    if(obj.backline!==undefined)S.backline=obj.backline;
    renderForm();renderPreview();
  }catch(e){alert("Translation failed: "+e.message);}
  btn.textContent=old;
}
function runAIHeuristic(){
  const raw=$("aiInput").value;
  if(!raw.trim()){$("aiResult").textContent=L("ai_empty");return;}
  let found=[];
  const email=raw.match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
  const phone=raw.match(/(\+?\d[\d\s().-]{7,}\d)/);
  if(email||phone){
    if(!S.contacts[0])S.contacts=[{role:"Contact",name:"",email:"",phone:""}];
    if(email){S.contacts[0].email=email[0];found.push("email");}
    if(phone){S.contacts[0].phone=phone[0].trim();found.push("phone");}
  }
  const caps=raw.match(/^\s*([A-Z][A-Z0-9' ]{1,18})\s*$/m);
  if(caps&&!S.band.name){S.band.name=caps[1].trim();found.push("band name");}
  const tp=raw.match(/(?:travel\s*party|reisgezelschap|touring party|reisegruppe|équipe|bestaat uit|band\s*\+?\s*crew)\D{0,12}(\d{1,2})/i)||raw.match(/(\d{1,2})\s*[- ]?(?:koppige|piece|piéce|köpfige)/i)||raw.match(/(\d{1,2})\s*(?:persons|personen|personnes|personas|people)/i);
  if(tp){S.travelParty=[{label:"Band + crew",count:tp[1]}];found.push("travel party");}
  const bo=raw.match(/buy[\s-]?out[^€$\d]{0,12}[€$]?\s*(\d{1,3})/i)||raw.match(/[€$]\s*(\d{1,3})[,.]?-?\s*(?:p\.?p\.?|per person|pro person|par personne)/i);
  if(bo){S.hosp.buyout="€"+bo[1];found.push("buy-out");}
  const diet=[];
  if(/diabe|keto/i.test(raw))diet.push("Band member with diabetes — low-carb (keto)");
  if(/vegan/i.test(raw))diet.push("1× vegan");
  if(/vega|vegetar|végét/i.test(raw)&&!/vegan/i.test(raw))diet.push("1× vegetarian");
  const allerg=raw.match(/(no shrimp|geen garnalen|gluten[- ]?free|glutenvrij|lactose[- ]?free|nut allerg|notenallergie)/i);
  if(allerg)diet.push(allerg[1]);
  if(diet.length){S.hosp.dietary=diet;found.push(diet.length+" dietary");}
  const inLines=[...raw.matchAll(/^\s*(\d{1,2})[\s.)|]+([A-Za-z][A-Za-z0-9 \/&'+-]{2,30})/gm)];
  if(inLines.length>=3){
    S.inputs=inLines.slice(0,48).map(m=>({ch:m[1],input:m[2].trim(),micdi:"",p48:"",stand:"",pos:"",notes:""}));
    found.push(inLines.length+" input channels");
  }
  renderForm();renderPreview();
  $("aiResult").textContent=found.length?(L("ai_recognized")+found.join(", ")+L("ai_check")):L("ai_none");
}

/* ===================== Example (random, fictional) ===================== */
function _pick(a){return a[Math.floor(Math.random()*a.length)];}
function _int(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function _chance(p){return Math.random()<p;}
function _shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
const EX={
  bands:["Violet Static","Cobalt Hours","Paper Tigers","Mara Vale","Lowlight","Neon Hymns","The Driftwood","Saffron Road","Echo Mirage","Northern Glow","Halcyon Bay","Smoke & Ember","Wild Antenna","Marble Skies","Riverside Noise","Glasshouse","Tidal Veil","Golden Hour Club","Velvet Approach","Paper Moons"],
  subtitle:["Technical & Hospitality Rider","Tour Rider","Technical Rider","Live Rider"],
  first:["Sam","Noa","Liam","Ava","Finn","Mila","Luca","Ivy","Jonas","Lena","Max","Robin","Tess","Cas","Jade","Ruben","Sara","Bram","Nina","Daan"],
  last:["de Vries","Janssen","Bakker","Visser","Smit","Meijer","Hart","Stone","Rivers","Vance","Brandt","Koster","Novak","Ferro","Kane","Holt","Reyes","Vale","Mercer","Lund"],
  roles:["Tour manager","Tour manager & FOH","Production manager","Booking & advance"],
  domains:["example.com","example.org","mail.example","band-mgmt.example"]
};
function _person(){return _pick(EX.first)+" "+_pick(EX.last);}
function _email(name){return name.toLowerCase().replace(/[^a-z]+/g,".").replace(/^\.+|\.+$/g,"")+"@"+_pick(EX.domains);}
function _phone(){return "+31 6 "+_int(10,99)+" "+_int(10,99)+" "+_int(10,99)+" "+_int(10,99);}
function loadExample(){
  const lang=S.lang; S=blank(); S.lang=lang; selPlot=null; currentRiderId=null;
  const formation=_pick(["solo","duo","trio","four","five","dj"]);
  const band=_pick(EX.bands);
  S.band={name:band, subtitle:_pick(EX.subtitle)+(_chance(.6)?(" "+_int(2026,2027)):""), validUntil:"", accent:_pick(["#1b1a17","#33405a","#3a4a3f","#5a3a3a","#46405a"]), logo:""};
  S.intro=_pick([
    "Thanks for having us. We keep it simple and friendly — let's make a great show together with your crew.",
    "We're an easy, well-prepared act. A few essentials below to keep the day smooth for everyone.",
    "Looking forward to playing your venue. Anything unclear, just call or email — we're happy to help."
  ]);
  const tm=_person();
  S.contacts=[{role:_pick(EX.roles),name:tm,email:_email(tm),phone:_phone()}];
  if(_chance(.5)){const p=_person();S.contacts.push({role:"FOH engineer",name:p,email:_email(p),phone:_phone()});}
  let members;
  if(formation==="solo") members=["lead-ac"];
  else if(formation==="duo") members=_pick([["lead-ac","keys"],["lead-ac","guitar"],["lead","keys"]]);
  else if(formation==="trio") members=["drums","bass","lead-guitar"];
  else if(formation==="four") members=["drums","bass","guitar","lead-keys"];
  else if(formation==="five") members=_pick([["drums","bass","guitar","keys","lead"],["drums","bass","guitar","guitar2","lead-keys"]]);
  else members=["dj"];
  const partyCount = formation==="solo"?_int(1,2):formation==="duo"?_int(2,3):formation==="dj"?_int(1,3):_int(4,8);
  S.travelParty=[{label:"Band + crew",count:String(partyCount)}];
  S.guests=_pick(["10 guest spots per show.","Guest list of "+_int(6,20)+" per show.","A few guest spots, list on the day."]);
  S.hosp.dressing="Clean, lockable dressing room for "+partyCount+" people\nHeating/AC, water, mirror, WiFi + password";
  S.hosp.towels=_int(partyCount,partyCount+4)+" clean towels";
  S.hosp.catering=_pick(["Warm, healthy meal for the party — no fast food.","A fresh hot meal on arrival, please.","Catering for the full party; veggie-friendly appreciated."]);
  S.hosp.dietary=_shuffle(["1× vegetarian","1× vegan","1× gluten-free","1× no nuts","1× no shrimp","1× lactose-free"]).slice(0,_int(0,2));
  if(S.hosp.dietary.length===0)S.hosp.dietary=[""];
  S.hosp.buyout="€"+_pick([20,25,30]);
  S.hosp.drinks=_shuffle([{item:"Water (still)",qty:"12"},{item:"Water (sparkling)",qty:"6"},{item:"Soft drinks",qty:"12"},{item:"Beer (local)",qty:String(_int(12,24))},{item:"Coffee & tea",qty:"unlimited"},{item:"Energy drink",qty:"6"},{item:"Dry white wine",qty:"1"}]).slice(0,_int(3,5));
  S.hosp.snacks=_pick(["Fruit, nuts and chocolate.","Some fresh fruit and crisps.","Healthy snacks appreciated."]);
  const w=(formation==="solo"||formation==="dj")?_int(5,7):_int(7,10);
  const d=_int(5,7);
  S.tech.soundcheck=_pick(["Allow ~45 min setup, 20 min changeover.","About 1 hour setup; 30 min changeover.","Quick line check if risers are pre-built."]);
  const crew=[{role:"Sound engineer (house)",count:"1"},{role:"Stagehand",count:String(_int(1,2))}];
  if(formation!=="solo"&&formation!=="dj")crew.push({role:"Lighting tech",count:"1"});
  S.tech.crew=crew;
  S.tech.stage="Stable stage, min. "+w+" m wide × "+d+" m deep."+((formation==="four"||formation==="five")?" 1–2 risers for keys/drums.":"");
  S.tech.power="230V at marked positions.";
  S.tech.foh=_pick(["House console fine (no Behringer X32, please).","We bring our own console; 1× CAT to FOH.","Any decent digital console with 24+ channels."]);
  S.tech.monitors=formation==="dj"?"2 wedges at the booth.":("IEM/wedges as per input list; "+_int(2,5)+" mixes.");
  S.tech.pa="Full-range, even coverage (L-Acoustics, d&b, Adamson or equivalent).";
  S.tech.wireless=_chance(.5)?"1× wireless handheld from the house.":"";
  S.backline=_pick(["We bring our own backline.","House backline requested — list on advance.","Mostly our own; drum shells from house."]);
  S.inputs=[];
  const add=(input,micdi,p48,pos,notes)=>S.inputs.push({ch:"",input:input,micdi:micdi||"",p48:p48||"",stand:"",pos:pos||"",notes:notes||""});
  if(members.includes("drums")){add("Kick","Mic","","Drums");add("Snare","Mic","","Drums");add("Hihat","Mic","X","Drums");add("OH L","Mic","X","Drums");add("OH R","Mic","X","Drums");}
  if(members.includes("bass")) add("Bass DI","DI","","Bass");
  if(members.includes("guitar")||members.includes("lead-guitar")) add("Guitar","XLR","","Guitar");
  if(members.includes("guitar2")) add("Guitar 2","XLR","","Guitar");
  if(members.includes("keys")||members.includes("lead-keys")){add("Keys L","DI","X","Keys","Stereo DI");add("Keys R","DI","X","Keys","Stereo DI");}
  if(members.includes("lead-ac")) add("Ac. Guitar","DI","X","Centre");
  if(members.includes("dj")){add("Playback L","DI","X","DJ");add("Playback R","DI","X","DJ");}
  if(!members.includes("dj")||_chance(.7)) add("Lead Vocal","XLR","","Centre");
  if((formation==="four"||formation==="five")&&_chance(.6)) add("BV Vocal","XLR","");
  renumberInputs();
  S.auxes=[];
  if(formation!=="dj"){
    const aad=(dest,type,notes)=>S.auxes.push({n:"",dest:dest,type:type,notes:notes||""});
    aad("Lead vocal wedge","wedge");
    if(members.includes("drums"))aad("Drums IEM","iem","Stereo");
    if(members.includes("keys")||members.includes("lead-keys"))aad("Keys wedge","wedge");
    aad("Reverb vocals","fx");
    renumberAuxes();
  }
  if(!S.auxes.length)S.auxes=[{n:"1",dest:"",type:"",notes:""}];
  S.plot.items=[];
  const P=(type,x,y,extra)=>{const dft=PLOT_TYPES[type];S.plot.items.push(Object.assign({id:uid(),type:type,label:dft.lbl,x:x,y:y,w:dft.w,h:dft.h,rot:0},extra||{}));};
  if(members.includes("drums")) P("drums",_chance(.5)?52:50,24);
  if(members.includes("keys")||members.includes("lead-keys")) P("keys",24,26);
  if(members.includes("bass")) P("bass",20,52);
  if(members.includes("guitar")||members.includes("lead-guitar")) P("guitar",78,52);
  if(members.includes("guitar2")) P("guitar",64,40,{label:"GTR 2"});
  if(members.includes("dj")) P("keys",50,30,{label:"DJ"});
  if(members.includes("lead-ac")) P("vocal",50,46,{label:"LEAD"});
  if(!members.includes("lead-ac")&&!members.includes("dj")) P("vocal",50,62);
  const monN=(formation==="solo")?1:_int(2,4);
  for(let i=0;i<monN;i++){const x=(monN===1)?20:(18+i*(64/(monN-1)));P("monitor",Math.round(x),74);}
  if(_chance(.7)) P("power",12,40);
  if(_chance(.5)) P("power",86,40);
  S.stageplot="";
  applyChrome();renderForm();renderPreview();
  if($("aiResult"))$("aiResult").textContent="";
}
